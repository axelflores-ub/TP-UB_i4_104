name: Node.js CI Testing

on:
  push:
    braches: [main, master]
  pull_request: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del Codigo
        uses: actions/checkout@v4
      
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm test